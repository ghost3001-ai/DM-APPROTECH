<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci | DM APPROTECH</title>
  <meta name="description" content="Votre demande d'audit a été bien reçue par DM APPROTECH.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .merci-hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .merci-card {
      background: white;
      padding: 60px 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 600px;
      width: 100%;
    }
    .check-icon {
      width: 80px;
      height: 80px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 30px;
      font-size: 40px;
      font-weight: bold;
    }
    .merci-card h1 {
      color: var(--brand);
      margin-bottom: 20px;
      font-size: 2.5rem;
    }
    .merci-card p {
      color: var(--muted);
      font-size: 1.2rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a class="logo logo-with-image" href="index.html" aria-label="DM APPROTECH">
        <img src="images/Logo Dm_approtech.png" alt="DM APPROTECH" class="logo-img">
        <span class="logo-text">DM APPROTECH <span>Solutions énergétiques</span></span>
      </a>
    </div>
  </header>

  <main class="merci-hero">
    <div class="merci-card">
      <div class="check-icon">✓</div>
      <h1>Demande reçue !</h1>
      <p>Votre demande d'audit a été enregistrée avec succès. <br>Nos experts vous recontacteront sous 24h maximum pour convenir d'un rendez-vous.</p>
      <a href="index.html" class="btn btn-home">Retour à l'accueil</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="copyright">© 2026 DM APPROTECH. Tous droits réservés.</div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
