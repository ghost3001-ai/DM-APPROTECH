      height: auto;

    .merci-hero {
      display: grid;
      place-items: center;
      padding: 54px 20px;
    }

    .merci-card {

      font-size: 2.2rem;
      font-weight: 950;
      box-shadow: 0 16px 34px rgba(47, 190, 99, 0.3);
    }

    .merci-card h1 {
      margin-bottom: 16px;
      color: var(--brand);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
    }

    .merci-card p {
      max-width: 54ch;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .merci-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .merci-footer {
      padding: 20px;
      color: rgba(255, 255, 255, 0.76);
      text-align: center;
      font-weight: 700;
